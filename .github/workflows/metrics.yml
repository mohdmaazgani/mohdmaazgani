name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          fetch-depth: 0

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohdmaazgani
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: github-metrics.svg
          output_action: commit

      - name: Checkout repo fresh
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          fetch-depth: 0

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          USERNAME: mohdmaazgani
          BRANCH_NAME: main
          UTC_OFFSET: 5
          AUTO_PUSH: false

      - name: Push summary cards manually
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add -f ./profile-summary-card-output/
          git diff --staged --quiet || git commit -m "chore: update profile summary cards"
          git push https://x-access-token:${{ secrets.METRICS_TOKEN }}@github.com/mohdmaazgani/mohdmaazgani.git main
